steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/raja-dashboard/app:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/raja-dashboard/app:latest'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/raja-dashboard/app'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'raja-dashboard'
      - '--image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/raja-dashboard/app:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=raja-dashboard-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=$PROJECT_ID:asia-southeast1:raja-db-instance'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=SQL_HOST=/cloudsql/$PROJECT_ID:asia-southeast1:raja-db-instance'
      - '--set-secrets=SQL_USER=SQL_USER:latest'
      - '--set-secrets=SQL_PASSWORD=SQL_PASSWORD:latest'
      - '--set-secrets=SQL_DB_NAME=SQL_DB_NAME:latest'
      - '--set-secrets=MIMO_API_KEY=MIMO_API_KEY:latest'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=60'
    waitFor: ['push-image']

# Images to store in Artifact Registry
images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/raja-dashboard/app:$COMMIT_SHA'
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/raja-dashboard/app:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
